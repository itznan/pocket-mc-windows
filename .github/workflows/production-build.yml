name: .NET Core Desktop

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  workflow_dispatch: # Allows manual testing from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to see previous tags for delta comparison

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore & Build
        run: |
          dotnet restore PocketMC.Desktop.sln
          dotnet build PocketMC.Desktop.sln --configuration Release --no-restore

      # ── Release Logic: Enabled for Tags, Main Branch, and Manual Runs ───────────

      - name: Install Velopack CLI
        # Condition expanded to allow testing on main or manual runs
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: dotnet tool install -g vpk

      - name: Add dotnet tools to PATH
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Publish WPF app
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: |
          dotnet publish PocketMC.Desktop/PocketMC.Desktop.csproj `
            -c Release -r win-x64 --self-contained true -o ./publish

      - name: Download Previous Release (For Delta Generation)
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force -Path Releases | Out-Null
          # vpk download syncs the latest releases.win.json and .nupkg to the local dir
          vpk download github --repoUrl "https://github.com/${{ github.repository }}" --outputDir Releases 2>$null || true

      - name: Pack Velopack Release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          # Use tag version if available, otherwise use a build-number version
          $ver = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}".TrimStart('v') } else { "0.0.1-build${{ github.run_number }}" }

          # vpk pack automatically generates deltas if previous .nupkg files exist in Releases/
          vpk pack --packId PocketMC --packVersion $ver --packDir ./publish --mainExe PocketMC.Desktop.exe --icon PocketMC.Desktop/icon.ico --outputDir Releases --delta BestSize

      # ── Final Release: ONLY RUNS ON TAGS ──────────────────────────────────────

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $files = Get-ChildItem -Path Releases -File | ForEach-Object { $_.FullName }
          gh release create $tag $files --title "PocketMC $tag" --generate-notes

      - name: Upload Artifacts (Always for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: PocketMC_Build_${{ github.run_number }}
          path: Releases/
