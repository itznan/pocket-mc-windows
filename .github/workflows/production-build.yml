name: Production Build

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      DOTNET_VERSION: "8.0.x"
      RUNTIME: win-x64
      APP_ID: PocketMC
      VERSION: 1.4.3 # <-- single source of truth

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Add .NET tools to PATH
        shell: pwsh
        run: echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

      - name: Install Velopack
        run: dotnet tool install -g vpk

      - name: Debug Build
        run: dotnet build PocketMC.Desktop.sln -c Debug

      - name: Release Build
        run: dotnet build PocketMC.Desktop.sln -c Release

      - name: Run Tests
        run: dotnet test PocketMC.Desktop.sln --no-build

      - name: Publish Multi-DLL
        run: |+
          dotnet publish PocketMC.Desktop/PocketMC.Desktop.csproj `
            -c Release `
            -r $env:RUNTIME `
            --self-contained false `
            -o publish
            
      - name: Download previous release assets
        uses: robinraju/release-downloader@v1
        with:
          repository: PocketMC/pocket-mc-windows
          latest: true
          fileName: "*"
          out-file-path: Releases
          token: ${{ secrets.GITHUB_TOKEN }}

      # 🔍 Extract previous version
      - name: Get previous version
        id: prev
        shell: pwsh
        run: |
          if (Test-Path "Releases") {
            $file = Get-ChildItem Releases -Filter "*.nupkg" | Select-Object -First 1
            if ($file -and $file.Name -match "\d+\.\d+\.\d+") {
              echo "version=$($Matches[0])" >> $env:GITHUB_OUTPUT
              exit 0
            }
          }
          echo "version=none" >> $env:GITHUB_OUTPUT

      # 🧠 Compare versions
      - name: Compare versions
        id: compare
        shell: pwsh
        run: |
          if ("${{ steps.prev.outputs.version }}" -eq "${{ env.VERSION }}") {
            echo "skip=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "skip=false" >> $env:GITHUB_OUTPUT
          }

      # 🚀 Pack only if version changed
      - name: Pack with Velopack
        if: steps.compare.outputs.skip == 'false'
        run: >
          vpk pack  --packId ${{ env.APP_ID }}  --packVersion ${{ env.VERSION }}
          --packDir publish  --mainExe PocketMC.Desktop.exe  --framework
          net8.0  --runtime ${{ env.RUNTIME }}  --outputDir Releases

      # 📦 Upload only if packaged
      - name: Upload Release Artifacts
        if: steps.compare.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: PocketMC-Release-${{ env.VERSION }}
          path: Releases/
          # 🧹 Keep only current version artifacts
      - name: Clean old packages
        if: steps.compare.outputs.skip == 'false'
        shell: pwsh
        run: |
          Get-ChildItem Releases -File | Where-Object {
            $_.Name -notmatch "${{ env.VERSION }}"
          } | Remove-Item -Force

          # 🚀 Create GitHub Release and upload assets
      - name: Create GitHub Release
        if: steps.compare.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: PocketMC v${{ env.VERSION }}
          body: |
            Release version ${{ env.VERSION }}

            - Auto-built via CI
            - Includes latest packaged binaries
          files: Releases/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
