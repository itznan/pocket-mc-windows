name: Production Build

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      DOTNET_VERSION: "8.0.x"
      RUNTIME: win-x64
      APP_ID: PocketMC

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # --- CI: BUILD & TEST (Runs on PRs and Pushes) ---

      - name: Build Entire Solution
        run: dotnet build PocketMC.Desktop.sln -c Release

      - name: Run Tests
        run: dotnet test PocketMC.Desktop.sln -c Release --no-build

      - name: Publish App
        run: |
          dotnet publish PocketMC.Desktop/PocketMC.Desktop.csproj `
            -c Release `
            -r $env:RUNTIME `
            --no-build `
            --self-contained false `
            -o publish

      # --- CD: PACK & RELEASE (Runs ONLY on Push to Master) ---

      - name: Extract Version from csproj
        if: github.event_name == 'push'
        id: version
        run: |
          [xml]$csproj = Get-Content PocketMC.Desktop/PocketMC.Desktop.csproj
          $version = $csproj.Project.PropertyGroup.Version
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "1.0.0" }
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV
          Write-Host "Detected Version: $version"

      - name: Add .NET tools to PATH
        if: github.event_name == 'push'
        run: echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

      - name: Install Velopack
        if: github.event_name == 'push'
        run: dotnet tool install -g vpk

      - name: Download previous release assets
        if: github.event_name == 'push'
        uses: robinraju/release-downloader@v1
        with:
          repository: PocketMC/pocket-mc-windows
          latest: true
          fileName: "*"
          out-file-path: Releases
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pack with Velopack
        if: github.event_name == 'push'
        run: >
          vpk pack 
          --packId ${{ env.APP_ID }} 
          --packVersion ${{ env.APP_VERSION }}
          --packDir publish 
          --mainExe PocketMC.Desktop.exe 
          --framework net8.0 
          --runtime ${{ env.RUNTIME }} 
          --outputDir Releases

      - name: Upload Release Artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: PocketMC-Release-${{ env.APP_VERSION }}
          path: Releases/
