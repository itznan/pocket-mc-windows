name: Production Build

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      DOTNET_VERSION: "8.0.x"
      RUNTIME: win-x64
      APP_ID: PocketMC
      VERSION: 1.4.3 # <-- single source of truth

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Add .NET tools to PATH
        shell: pwsh
        run: echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

      - name: Install Velopack
        run: dotnet tool install -g vpk

      - name: Debug Build
        run: dotnet build PocketMC.Desktop.sln -c Debug

      - name: Release Build
        run: dotnet build PocketMC.Desktop.sln -c Release

      - name: Run Tests
        run: dotnet test PocketMC.Desktop.sln --no-build

      # 🧠 Check version via GitHub API (Instant)
      - name: Compare with Latest Release Tag
        id: check_version
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch the latest release tag silently
          $latestTag = gh release view --json tagName --jq .tagName 2>$null
          
          if ($latestTag -eq "v${{ env.VERSION }}") {
            Write-Host "Version v${{ env.VERSION }} is already released. Skipping deployment."
            echo "is_new=false" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "New version detected: v${{ env.VERSION }} (Previous: $latestTag)."
            echo "is_new=true" >> $env:GITHUB_OUTPUT
          }

      # 🚀 Gate all heavy operations behind the version check
      - name: Publish Multi-DLL
        if: steps.check_version.outputs.is_new == 'true'
        run: |+
          dotnet publish PocketMC.Desktop/PocketMC.Desktop.csproj `
            -c Release `
            -r $env:RUNTIME `
            --self-contained false `
            -o publish
            
      # 📦 Required for Velopack Delta Updates
      - name: Download previous release assets
        if: steps.check_version.outputs.is_new == 'true'
        uses: robinraju/release-downloader@v1
        with:
          repository: PocketMC/pocket-mc-windows
          latest: true
          fileName: "*.nupkg" # Only grab what Velopack actually needs for deltas
          out-file-path: Releases
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pack with Velopack
        if: steps.check_version.outputs.is_new == 'true'
        run: >
          vpk pack --packId ${{ env.APP_ID }} --packVersion ${{ env.VERSION }}
          --packDir publish --mainExe PocketMC.Desktop.exe --framework
          net8.0 --runtime ${{ env.RUNTIME }} --outputDir Releases

      - name: Upload Release Artifacts
        if: steps.check_version.outputs.is_new == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: PocketMC-Release-${{ env.VERSION }}
          path: Releases/
      
      - name: Create GitHub Release
        if: steps.check_version.outputs.is_new == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: PocketMC v${{ env.VERSION }}
          body: |
            Release version ${{ env.VERSION }}

            - Auto-built via CI
            - Includes latest packaged binaries
          files: Releases/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
