name: Production Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      DOTNET_VERSION: '8.0.x'
      RUNTIME: win-x64
      APP_ID: PocketMC
      MAIN_EXE: PocketMC.exe

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # 🔧 Fix for global tools (IMPORTANT)
    - name: Add .NET tools to PATH
      run: echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

    - name: Install Velopack CLI
      run: dotnet tool install -g vpk

    # -------------------------
    # 🔨 DEBUG BUILD
    # -------------------------
    - name: Build Debug
      run: dotnet build PocketMC.Desktop.sln -c Debug

    # -------------------------
    # 🚀 RELEASE BUILD
    # -------------------------
    - name: Build Release
      run: dotnet build PocketMC.Desktop.sln -c Release

    # -------------------------
    # 🧪 TESTS
    # -------------------------
    - name: Run Tests
      run: dotnet test PocketMC.Desktop.sln --no-build --verbosity normal

    # -------------------------
    # 📦 PUBLISH (MULTI-DLL)
    # -------------------------
    - name: Publish App
      run: |
        dotnet publish PocketMC.Desktop/PocketMC.Desktop.csproj `
          -c Release `
          -r $env:RUNTIME `
          --self-contained false `
          -o publish

    # -------------------------
    # 📥 DOWNLOAD PREVIOUS RELEASE (for delta)
    # -------------------------
    - name: Download previous release
      uses: robinraju/release-downloader@v1
      with:
        latest: true
        fileName: '*.nupkg'
        out-file-path: Releases
      continue-on-error: true

    # -------------------------
    # 📦 VELOPACK PACKAGE
    # -------------------------
    - name: Pack with Velopack
      run: |
        vpk pack `
          --packId $env:APP_ID `
          --packVersion 1.3.0 `
          --packDir publish `
          --mainExe $env:MAIN_EXE `
          --framework net8.0 `
          --runtime $env:RUNTIME `
          --outputDir Releases

    # -------------------------
    # 📤 UPLOAD ARTIFACTS
    # -------------------------
    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: velopack-installer
        path: Releases/
