name: .NET Core Desktop

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    # ── Checkout ────────────────────────────────────────────────────────────────
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Required for gh release list to work correctly

    # ── .NET setup ──────────────────────────────────────────────────────────────
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # ── Cache NuGet packages ────────────────────────────────────────────────────
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          nuget-

    # ── Restore ─────────────────────────────────────────────────────────────────
    - name: Restore dependencies
      run: dotnet restore PocketMC.Desktop.sln

    # ── Build ───────────────────────────────────────────────────────────────────
    - name: Build Release
      run: dotnet build PocketMC.Desktop.sln --configuration Release --no-restore

    # ── Tests ────────────────────────────────────────────────────────────────────
    - name: Run Tests
      run: dotnet test PocketMC.Desktop.sln --configuration Release --no-build

    # ═══════════════════════════════════════════════════════════════════════════
    # Release steps — now enabled for tags, manual runs, and main branch pushes
    # ═══════════════════════════════════════════════════════════════════════════

    # ── Install Velopack CLI ─────────────────────────────────────────────────────
    - name: Install Velopack CLI
      if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
      run: dotnet tool install -g vpk

    - name: Add dotnet tools to PATH
      if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
      shell: pwsh
      run: echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    # ── Publish WPF application ──────────────────────────────────────────────────
    - name: Publish WPF app (win-x64 self-contained)
      if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
      run: |
        dotnet publish PocketMC.Desktop/PocketMC.Desktop.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=false `
          -o ./publish

    # ── Download previous release packages for delta generation ─────────────────
    - name: Download previous release packages for delta generation
      if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Using built-in token for downloads
      run: |
        New-Item -ItemType Directory -Force -Path Releases | Out-Null
        
        # Determine the tag to compare against
        $currentTag = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "latest" }
        
        $releasesJson = gh release list --limit 10 --json tagName,isDraft,isPrerelease 2>$null
        if ($null -eq $releasesJson -or $releasesJson -eq "[]") {
          Write-Host "No previous releases found. Skipping delta download."
          exit 0
        }

        $previous = ($releasesJson | ConvertFrom-Json) | Where-Object { -not $_.isDraft -and $_.tagName -ne $currentTag } | Select-Object -First 1
        if ($previous) {
          Write-Host "Downloading assets from $($previous.tagName) for delta generation..."
          gh release download $($previous.tagName) --dir Releases --pattern "*.nupkg" --skip-existing 2>$null
        }

    # ── Pack Velopack release ────────────────────────────────────────────────────
    - name: Pack Velopack release
      if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
      shell: pwsh
      run: |
        # Fallback versioning if not on a tag
        $releaseVersion = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}".TrimStart('v') } else { "0.0.0-build-${{ github.run_number }}" }
        
        vpk pack `
          --packId PocketMC `
          --packVersion $releaseVersion `
          --packDir ./publish `
          --mainExe PocketMC.Desktop.exe `
          --releaseDir Releases `
          --delta BestSpeed

    # ── Create GitHub Release (RESTRICTED TO TAGS) ──────────────────────────────
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $tag = "${{ github.ref_name }}"
        $files = Get-ChildItem -Path Releases -File -Recurse | Where-Object { $_.Length -gt 0 } | ForEach-Object { $_.FullName }
        
        gh release create $tag $files --title "PocketMC $tag" --generate-notes

    # ── Upload artifact for debugging ───────────────────────────────────────────
    - name: Upload Velopack artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PocketMC_Build_${{ github.run_number }}
        path: Releases/
        retention-days: 7
        
