name: .NET Core Desktop

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          nuget-

    - name: Restore dependencies
      run: dotnet restore PocketMC.Desktop.sln

    - name: Build Configuration Debug
      run: dotnet build PocketMC.Desktop.sln --configuration Debug --no-restore

    - name: Build Configuration Release
      run: dotnet build PocketMC.Desktop.sln --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test PocketMC.Desktop.sln --configuration Release --no-build

    - name: Install Velopack CLI
      if: startsWith(github.ref, 'refs/tags/')
      run: dotnet tool install -g vpk

    - name: Add dotnet tools to PATH
      if: startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      run: echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Publish WPF app
      if: startsWith(github.ref, 'refs/tags/')
      run: dotnet publish PocketMC.Desktop/PocketMC.Desktop.csproj -c Release -r win-x64 -o ./publish

    - name: Pack Velopack release
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        $releaseVersion = "${{ github.ref_name }}".TrimStart('v')
        if ([string]::IsNullOrWhiteSpace($releaseVersion)) { Write-Error "Unable to determine release version from tag."; exit 1 }
        vpk pack -u PocketMC -v $releaseVersion -p ./publish -e PocketMC.Desktop.exe

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.RELEASE_PAT }}
      run: |
        if (-not $env:GH_TOKEN) {
          Write-Error "Set a repository secret named RELEASE_PAT with permissions to create releases."
          exit 1
        }

        $tag = "${{ github.ref_name }}"
        $releaseVersion = $tag.TrimStart('v')
        $files = Get-ChildItem -Path Releases -File -Recurse | Where-Object { $_.Length -gt 0 } | ForEach-Object { $_.FullName }

        if (-not $files) {
          Write-Error "No files found in Releases/ to upload."
          exit 1
        }

        gh release create $tag $files --repo $env:GITHUB_REPOSITORY --title "PocketMC $tag" --notes "Release built by CI for $releaseVersion"

    - name: Upload Velopack release artifact
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v4
      with:
        name: PocketMC_Velopack
        path: Releases/
