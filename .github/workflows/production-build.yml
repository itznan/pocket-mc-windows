name: Production Build

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      DOTNET_VERSION: "8.0.x"
      RUNTIME: win-x64
      APP_ID: PocketMC
      VERSION: 1.5.3 # <-- single source of truth

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Add .NET tools to PATH
        shell: pwsh
        run: echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

      - name: Install Velopack
        run: dotnet tool install -g vpk

      - name: Debug Build
        run: dotnet build PocketMC.Desktop.sln -c Debug

      - name: Release Build
        run: dotnet build PocketMC.Desktop.sln -c Release

      - name: Run Tests
        run: dotnet test PocketMC.Desktop.sln --no-build

      - name: Publish Multi-DLL
        run: |
          dotnet publish PocketMC.Desktop/PocketMC.Desktop.csproj `
            -c Release `
            -r $env:RUNTIME `
            --self-contained false `
            -o publish

      - name: Publish Portable Release EXE (Test Release)
        run: |
          dotnet publish PocketMC.Desktop/PocketMC.Desktop.csproj `
            -c Release `
            -r $env:RUNTIME `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o "Test Release/Portable"

      - name: Upload Test Release Portable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PocketMC-Test-Portable-${{ github.run_number }}
          path: Test Release/Portable/

      # 🔽 KEEP THIS (for Velopack delta support, NOT version logic)
      - name: Download previous release assets
        uses: robinraju/release-downloader@v1
        with:
          repository: PocketMC/pocket-mc-windows
          latest: true
          fileName: "*"
          out-file-path: Releases
          token: ${{ secrets.GITHUB_TOKEN }}

      # 🔍 Get latest GitHub release version (source of truth)
      - name: Get latest release version
        id: latest
        shell: pwsh
        run: |
          try {
            $response = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/latest" `
              -Headers @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}" }

            $tag = $response.tag_name

            if (-not $tag) {
              echo "version=none" >> $env:GITHUB_OUTPUT
            } else {
              $clean = $tag -replace '^v', ''
              echo "version=$clean" >> $env:GITHUB_OUTPUT
            }
          } catch {
            echo "version=none" >> $env:GITHUB_OUTPUT
          }

      # 🧠 Compare versions
      - name: Compare versions
        id: compare
        shell: pwsh
        run: |
          $current = "${{ env.VERSION }}"
          $latest  = "${{ steps.latest.outputs.version }}"

          Write-Host "Current version: $current"
          Write-Host "Latest release: $latest"

          if ($latest -eq "none") {
            echo "skip=false" >> $env:GITHUB_OUTPUT
          }
          elseif ($current -eq $latest) {
            echo "skip=true" >> $env:GITHUB_OUTPUT
          }
          else {
            echo "skip=false" >> $env:GITHUB_OUTPUT
          }

      # 🚀 Pack only if version changed
      - name: Pack with Velopack
        if: steps.compare.outputs.skip == 'false'
        run: >
          vpk pack --packId ${{ env.APP_ID }} --packVersion ${{ env.VERSION }}
          --packDir publish --mainExe PocketMC.Desktop.exe --framework net8.0
          --runtime ${{ env.RUNTIME }} --outputDir Releases

      # 📦 Upload only if packaged
      - name: Upload Release Artifacts
        if: steps.compare.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: PocketMC-Release-${{ env.VERSION }}
          path: Releases/

      # 🚀 Create GitHub Release and upload assets
      - name: Create GitHub Release
        if: steps.compare.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: PocketMC v${{ env.VERSION }}
          body: |
            Release version ${{ env.VERSION }}
            - Auto-built via CI
            - Includes latest packaged binaries
          files: Releases/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
