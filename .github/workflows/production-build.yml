name: Production Build

on:
  push:
    branches:
      - master
      - New-Ci-Pipeline

jobs:
  build:
    runs-on: windows-latest

    env:
      DOTNET_VERSION: '8.0.x'
      RUNTIME: win-x64
      APP_ID: PocketMC

    steps:
    # -------------------------
    # 1. CHECKOUT
    # -------------------------
    - uses: actions/checkout@v4

    # -------------------------
    # 2. SETUP DEPENDENCIES
    # -------------------------
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # -------------------------
    # 3. ADD TOOL PATH
    # -------------------------
    - name: Add .NET tools to PATH
      run: echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

    # -------------------------
    # 4. INSTALL VELOPACK CLI
    # -------------------------
    - name: Install Velopack
      run: dotnet tool install -g vpk

    # -------------------------
    # 5. DEBUG BUILD
    # -------------------------
    - name: Debug Build
      run: dotnet build PocketMC.Desktop.sln -c Debug

    # -------------------------
    # 6. RELEASE BUILD
    # -------------------------
    - name: Release Build
      run: dotnet build PocketMC.Desktop.sln -c Release

    # -------------------------
    # 7. TEST
    # -------------------------
    - name: Run Tests
      run: dotnet test PocketMC.Desktop.sln --no-build

    # -------------------------
    # 8. PUBLISH MULTI-DLL
    # -------------------------
    - name: Publish Multi-DLL
      run: |
        dotnet publish PocketMC.Desktop/PocketMC.Desktop.csproj `
          -c Release `
          -r $env:RUNTIME `
          --self-contained false `
          -o publish

    # -------------------------
    # 10. GET PREVIOUS VERSION
    # -------------------------
    - name: Get Previous Version
      id: version
      env:
       GH_TOKEN: ${{ github.token }}
      run: |
        $latest = gh release list --limit 1 --json tagName | ConvertFrom-Json
        if ($latest) {
          $tag = $latest[0].tagName.Replace("v","")
        } else {
          $tag = "1.0.0"
        }

        $parts = $tag.Split(".")
        $major = [int]$parts[0]
        $minor = [int]$parts[1] + 1
        $patch = 0

        $newVersion = "$major.$minor.$patch"
        echo "VERSION=$newVersion" >> $env:GITHUB_ENV

    # -------------------------
    # 11. DOWNLOAD PREVIOUS RELEASE
    # -------------------------
    - name: Download previous release
      uses: robinraju/release-downloader@v1
      with:
        latest: true
        out-file-path: Releases
      continue-on-error: true

    # -------------------------
    # 12. VELOPACK PACKAGE
    # -------------------------
    - name: Pack with Velopack
      run: vpk pack --packId ${{ env.APP_ID }} --packVersion ${{ env.VERSION }} --packDir publish --mainExe PocketMC.Desktop.exe --framework net8.0 --runtime ${{ env.RUNTIME }} --outputDir Releases

    # -------------------------
    # 13. UPLOAD RELEASE ARTIFACTS
    # -------------------------
    - name: Upload Release Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Release ${{ env.VERSION }}
        path: Releases/
